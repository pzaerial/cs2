// Custom keybinds, compiled from the contents of ...\Steam\userdata\<YourSteam3ID>\730\local\cfg\cs2_user_keys_0_slot0.vcfg and the output of "differences" in the cs2 console.
unbindall

name "pZ_aeriaL"
sensitivity "0.698939"
player_nevershow_communityservermessage "1"

snd_deathcamera_volume "0.16"
snd_mapobjective_volume "0.04"
snd_menumap_volume "0.253502"
snd_menumusic_volume "0.04"
snd_mvp_volume "0.16"
snd_roundend_volume "0.16"
snd_tensecondwarning_volume "0.04"

bind "X_AXIS" "rightleft"
bind "Y_AXIS" "pitch"
bind "MOUSE_X" "yaw"
bind "MOUSE_Y" "pitch"
bind "mouse1" "+attack"
bind "mouse2" "+attack2"

bind "w" "+forward"
bind "s" "+back"
bind "a" "+left"
bind "d" "+right"
bind "shift" "+sprint"
bind "ctrl" "+duck"

bind "SPACE" "+jump"
bind "MWHEELUP" "+jump"
bind "MWHEELDOWN" "+jump"

bind "r" "+reload"
bind "e" "+use"
bind "g" "drop"
bind "q" "player_ping"
bind "f" "+lookatweapon"

bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "5" "slot5"
bind "ALT" "buymenu"
bind "TAB" "+showscores"
bind "`" "toggleconsole"

bind "MOUSE4" "lastinv"
bind "MOUSE5" "+voicerecord"

bind "z" "slot6"
bind "x" "slot8"
bind "c" "slot7"
bind "v" "slot10"
bind "b" "radio"
bind "n" "+radialradio"

bind "u" "messagemode2"
bind "y" "messagemode"

unbind "4"
unbind "6"

echo ">>> settings.cfg executed. <<<"

// Mandatory final line to save things.
host_writeconfig