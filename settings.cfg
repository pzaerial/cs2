//Unbind all and set default keybinds.
unbindall
key_default_bindings


// Custom keybinds, compiled from the contents of ...\Steam\userdata\<YourSteam3ID>\730\local\cfg\cs2_user_keys_0_slot0.vcfg and the output of "differences" in the cs2 console.
// Master Settings Configuration (Explicit Re-Bind Layout)

unbindall

name "pZ_aeriaL"
sensitivity "0.698939"
player_nevershow_communityservermessage "1"

// --- Audio ---
snd_deathcamera_volume "0.16"
snd_mapobjective_volume "0.04"
snd_menumap_volume "0.253502"
snd_menumusic_volume "0.04"
snd_mvp_volume "0.16"
snd_roundend_volume "0.16"
snd_tensecondwarning_volume "0.04"

// --- Core Mouse & Look Controls ---
bind "X_AXIS" "rightleft"
bind "Y_AXIS" "pitch"
bind "MOUSE_X" "yaw"
bind "MOUSE_Y" "pitch"
bind "mouse1" "+attack"
bind "mouse2" "+attack2"

// --- Core Movement ---
bind "w" "+forward"
bind "s" "+back"
bind "a" "+left"
bind "d" "+right"
bind "shift" "+sprint"
bind "ctrl" "+duck"

// --- Triple Jump Binds ---
bind "SPACE" "+jump"
bind "MWHEELUP" "+jump"
bind "MWHEELDOWN" "+jump"

// --- Interaction & Combat ---
bind "r" "+reload"
bind "e" "+use"
bind "g" "drop"
bind "q" "player_ping"

// --- Inventory Slots & UI ---
bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "5" "slot5"
bind "MOUSE4" "lastinv"
bind "MOUSE5" "slot4"
bind "ALT" "buymenu"

// --- Comms ---
bind "MOUSE3" "+voicerecord"
bind "u" "messagemode2"
bind "y" "messagemode"

// --- Explicitly Cleared Keys ---
bind "4" "<unbound>"
bind "b" "<unbound>"
bind "6" "<unbound>"

host_writeconfig
echo ">>> settings.cfg successfully executed. <<<"

// Mandatory final line to save things.
host_writeconfig