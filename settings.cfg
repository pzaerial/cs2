//Unbind all and set default keybinds.
unbindall
key_default_bindings


// Custom keybinds, compiled from the contents of ...\Steam\userdata\<YourSteam3ID>\730\local\cfg\cs2_user_keys_0_slot0.vcfg and the output of "differences" in the cs2 console.
name "pZ_aeriaL"
sensitivity "0.698939"
player_nevershow_communityservermessage "1"

snd_deathcamera_volume "0.16"
snd_mapobjective_volume "0.04"
snd_menumap_volume "0.253502"
snd_menumusic_volume "0.04"
snd_mvp_volume "0.16"
snd_roundend_volume "0.16"
snd_tensecondwarning_volume "0.04"

bind "w" "+forward"
bind "s" "+back"
bind "a" "+left"
bind "d" "+right"
bind "shift" "+sprint"
bind "ctrl" "+duck"
bind "mouse1" "+attack"
bind "mouse2" "+attack2"
bind "r" "+reload"
bind "e" "+use"
bind "g" "drop"

bind "SPACE" "+jump"
bind "MWHEELUP" "+jump"
bind "MWHEELDOWN" "+jump"
bind "q" "player_ping"
bind "MOUSE3" "+voicerecord"
bind "MOUSE4" "lastinv"
bind "MOUSE5" "slot4"
bind "ALT" "buymenu"

bind "4" "<unbound>"
bind "b" "<unbound>"
bind "6" "<unbound>"

host_writeconfig
echo ">>> settings.cfg successfully executed and saved! <<<"

// Mandatory final line to save things.
host_writeconfig